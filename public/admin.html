<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
<style>
body{font-family:Arial;padding:40px}
input,textarea{display:block;width:300px;margin-bottom:10px;padding:8px}
button{padding:10px 20px;margin-bottom:10px}
.card{border:1px solid #ccc;padding:10px;margin-bottom:10px}
</style>
</head>
<body>

<h2>Login</h2>
<input type="password" id="senha" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="painel" style="display:none">

<h2>Novo Produto</h2>
<input id="nome" placeholder="Nome">
<textarea id="descricao" placeholder="Descrição"></textarea>
<input id="preco" placeholder="Preço">
<input id="imagem" placeholder="URL da imagem">
<button onclick="criar()">Criar</button>

<h2>Produtos</h2>
<div id="lista"></div>

</div>

<script>
function login(){
  if(document.getElementById("senha").value==="1234"){
    document.getElementById("painel").style.display="block";
  }
}

async function carregar(){
  const res = await fetch("/api/produtos");
  const data = await res.json();
  const lista = document.getElementById("lista");
  lista.innerHTML="";
  data.forEach(p=>{
    lista.innerHTML+=`
      <div class="card">
        ${p.nome}
        <button onclick="deletar(${p.id})">Excluir</button>
      </div>
    `;
  });
}

async function criar(){
  await fetch("/api/produtos",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      nome:nome.value,
      descricao:descricao.value,
      preco:preco.value,
      imagem:imagem.value
    })
  });
  carregar();
}

async function deletar(id){
  await fetch("/api/produtos",{
    method:"DELETE",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({id})
  });
  carregar();
}

carregar();
</script>

</body>
</html>
