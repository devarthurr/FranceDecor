<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>France Decor</title>
<style>
body{font-family:Arial;margin:0;background:#0f172a;color:white}
header{padding:20px;text-align:center;background:#0b1120;font-size:26px}
.container{padding:30px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.card{background:#1e293b;border-radius:12px;overflow:hidden}
.card img{width:100%;height:220px;object-fit:cover}
.content{padding:15px}
.price{color:#38bdf8;font-weight:bold;margin-top:10px}
button{margin-top:10px;padding:8px;border:none;background:#25d366;color:white;border-radius:6px}
</style>
</head>
<body>

<header>France Decor</header>
<div class="container" id="produtos"></div>

<script>
async function carregar(){
  const res = await fetch("/api/produtos");
  const data = await res.json();
  const container = document.getElementById("produtos");
  container.innerHTML="";
  data.forEach(p=>{
    container.innerHTML+=`
      <div class="card">
        <img src="${p.imagem}">
        <div class="content">
          <h3>${p.nome}</h3>
          <p>${p.descricao}</p>
          <div class="price">R$ ${p.preco}</div>
          <button onclick="comprar('${p.nome}')">WhatsApp</button>
        </div>
      </div>
    `;
  });
}
function comprar(nome){
  const msg=`Olá, quero o produto ${nome}`;
  window.open(`https://wa.me/5599999999999?text=${encodeURIComponent(msg)}`);
}
carregar();
</script>

</body>
</html>
