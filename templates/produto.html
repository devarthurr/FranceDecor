<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ p.name }} | France Decor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --azul: #0047BB; }
        body { background-color: #fff; padding-bottom: 50px; }
        .carousel-item { height: 400px; background: #f8f9fa; }
        .carousel-item img { max-width: 100%; max-height: 100%; object-fit: contain; margin: auto; display: block; }
        .price-big { color: var(--azul); font-size: 2.2rem; font-weight: 800; }
        .btn-wa { background-color: #25D366; color: white; font-weight: bold; border-radius: 15px; padding: 15px; display: block; text-align: center; font-size: 1.1rem; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container py-4 px-3">
        <a href="/" class="text-primary text-decoration-none fw-bold"><i class="bi bi-arrow-left"></i> Voltar</a>
        
        <div class="row mt-3 g-4">
            <div class="col-md-7">
                <div id="pCar" class="carousel slide shadow rounded-4 overflow-hidden" data-bs-ride="false">
                    <div class="carousel-inner">
                        {% for img in images %}
                        <div class="carousel-item {% if loop.first %}active{% endif %}">
                            <img src="{{ img.strip() }}">
                        </div>
                        {% endfor %}
                    </div>
                    {% if images|length > 1 %}
                    <button class="carousel-control-prev" type="button" data-bs-target="#pCar" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon bg-dark rounded-circle"></span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#pCar" data-bs-slide="next">
                        <span class="carousel-control-next-icon bg-dark rounded-circle"></span>
                    </button>
                    {% endif %}
                </div>
            </div>

            <div class="col-md-5">
                <h2 class="fw-bold">{{ p.name }}</h2>
                <div class="price-big mb-3">
                    {% if p.price > 0 %} R$ {{ "%.2f"|format(p.price) }} {% else %} Consultar valor {% endif %}
                </div>
                <p class="text-muted mb-4">{{ p.description }}</p>
                <a href="https://wa.me/5511999999999?text=Interesse em: {{ p.name }}" class="btn-wa shadow-sm">
                    <i class="bi bi-whatsapp"></i> Pedir pelo WhatsApp
                </a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
