<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ p.name }} | France Decor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .carousel-item { height: 450px; background: #fff; }
        .carousel-item img { max-width: 100%; max-height: 100%; object-fit: contain; margin: auto; display: block; }
        .price-tag { color: #0047BB; font-size: 2.2rem; font-weight: 800; }
        .btn-wa { background: #25D366; color: white; font-weight: bold; border-radius: 50px; padding: 15px; display: block; text-align: center; font-size: 1.1rem; text-decoration: none; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }
    </style>
</head>
<body class="bg-light">
    <div class="container py-4">
        <a href="/" class="btn btn-link text-decoration-none fw-bold p-0 mb-4 text-primary fs-5"><i class="bi bi-arrow-left"></i> Voltar ao Catálogo</a>
        <div class="row g-5">
            <div class="col-md-7">
                <div id="pCar" class="carousel slide shadow-sm rounded-4 overflow-hidden" data-bs-ride="carousel">
                    <div class="carousel-inner border">
                        {% for img in images %}
                        <div class="carousel-item {% if loop.first %}active{% endif %}">
                            <img src="{{ img.strip() }}">
                        </div>
                        {% endfor %}
                    </div>
                    {% if images|length > 1 %}
                    <button class="carousel-control-prev" type="button" data-bs-target="#pCar" data-bs-slide="prev"><span class="carousel-control-prev-icon bg-dark rounded-circle p-3"></span></button>
                    <button class="carousel-control-next" type="button" data-bs-target="#pCar" data-bs-slide="next"><span class="carousel-control-next-icon bg-dark rounded-circle p-3"></span></button>
                    {% endif %}
                </div>
            </div>
            <div class="col-md-5">
                <h1 class="fw-bold text-dark">{{ p.name }}</h1>
                <div class="price-tag mb-4">
                    {% if p.price > 0 %} R$ {{ "%.2f"|format(p.price) }} {% else %} Consultar valor {% endif %}
                </div>
                <h6 class="fw-bold">Descrição do Item:</h6>
                <p class="text-muted mb-5 fs-5" style="white-space: pre-line;">{{ p.description }}</p>
                <a href="https://wa.me/5511999999999?text=Gostaria de solicitar orçamento para: {{ p.name }}" target="_blank" class="btn-wa">
                    <i class="bi bi-whatsapp"></i> Solicitar Orçamento
                </a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
