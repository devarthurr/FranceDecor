<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"></head>
<body class="bg-light">
    <div class="container py-5" style="max-width: 900px;">
        <a href="/" class="btn btn-outline-primary mb-4"><i class="bi bi-arrow-left"></i> Voltar</a>
        <div class="row g-4 bg-white p-4 rounded-4 shadow-sm">
            <div class="col-md-6">
                <div id="pCar" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        {% for img in images %}
                        <div class="carousel-item {% if loop.first %}active{% endif %}">
                            <img src="{{ img }}" class="d-block w-100 rounded" style="height: 400px; object-fit: contain; background: #f8f9fa;">
                        </div>
                        {% endfor %}
                    </div>
                    {% if images|length > 1 %}
                    <button class="carousel-control-prev" type="button" data-bs-target="#pCar" data-bs-slide="prev"><span class="carousel-control-prev-icon bg-dark rounded-circle"></span></button>
                    <button class="carousel-control-next" type="button" data-bs-target="#pCar" data-bs-slide="next"><span class="carousel-control-next-icon bg-dark rounded-circle"></span></button>
                    {% endif %}
                </div>
            </div>
            <div class="col-md-6">
                <h1 class="fw-bold">{{ p.name }}</h1>
                <h2 class="text-primary fw-bold mb-4">{% if p.price > 0 %} R$ {{ "%.2f"|format(p.price) }} {% else %} Consultar valor {% endif %}</h2>
                <p class="text-muted" style="white-space: pre-line;">{{ p.description }}</p>
                <a href="https://wa.me/5511999999999?text=Gostaria de pedir: {{ p.name }}" class="btn btn-success btn-lg w-100 mt-4 fw-bold">Pedir pelo WhatsApp</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
