<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light p-4">
    <div class="container bg-white p-4 rounded-4 shadow" style="max-width: 800px;">
        <a href="/" class="btn btn-sm btn-link mb-3 text-decoration-none">← Voltar</a>
        <div class="row">
            <div class="col-md-6">
                <div id="pCar" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        {% for img in images %}
                        <div class="carousel-item {% if loop.first %}active{% endif %}">
                            <img src="{{ url_for('static', filename='produtos/' + img) }}" class="d-block w-100" style="height:350px; object-fit:contain;">
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <h2 class="fw-bold">{{ p.name }}</h2>
                <h3 class="text-primary">R$ {{ "%.2f"|format(p.price) if p.price > 0 else "Consultar" }}</h3>
                <p>{{ p.description }}</p>
                <a href="#" class="btn btn-success w-100 fw-bold">Pedir agora</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
