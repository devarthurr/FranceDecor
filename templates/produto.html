<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ p.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light p-3">
    <div class="container bg-white p-4 rounded-4 shadow-sm" style="max-width: 800px;">
        <a href="/" class="btn btn-sm btn-outline-secondary mb-3"><i class="bi bi-arrow-left"></i> Voltar</a>
        <div class="row g-4">
            <div class="col-md-6">
                <div id="pCar" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner rounded-3">
                        {% for img in images %}
                        <div class="carousel-item {% if loop.first %}active{% endif %}">
                            <img src="{{ img.strip() }}" class="d-block w-100" style="height:350px; object-fit:contain; background:#f8f9fa;">
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
            <div class="col-md-6 text-center text-md-start">
                <h2 class="fw-bold">{{ p.name }}</h2>
                <h3 class="text-primary fw-bold mb-3">{% if p.price > 0 %} R$ {{ "%.2f"|format(p.price) }} {% else %} Consultar valor {% endif %}</h3>
                <p class="text-muted" style="white-space: pre-line;">{{ p.description }}</p>
                <a href="https://wa.me/5511999999999?text=Interesse em: {{ p.name }}" class="btn btn-success btn-lg w-100 fw-bold rounded-pill mt-4"><i class="bi bi-whatsapp"></i> Pedir pelo WhatsApp</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
