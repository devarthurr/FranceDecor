<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ p.name }} | France Decor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .carousel-item { height: 450px; background: #fff; border-radius: 15px; }
        .carousel-item img { max-width: 100%; max-height: 100%; object-fit: contain; margin: auto; display: block; }
        .price-tag { color: #0047BB; font-size: 2.5rem; font-weight: 800; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <a href="/" class="btn btn-outline-primary mb-4 border-2 fw-bold"><i class="bi bi-arrow-left"></i> VOLTAR</a>
        
        <div class="row g-4 bg-white p-4 rounded-4 shadow-sm">
            <div class="col-md-6">
                <div id="productCarousel" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        {% for img in images %}
                        <div class="carousel-item {% if loop.first %}active{% endif %}">
                            <img src="{{ img }}">
                        </div>
                        {% endfor %}
                    </div>
                    {% if images|length > 1 %}
                    <button class="carousel-control-prev" type="button" data-bs-target="#productCarousel" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon bg-dark rounded-circle"></span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#productCarousel" data-bs-slide="next">
                        <span class="carousel-control-next-icon bg-dark rounded-circle"></span>
                    </button>
                    {% endif %}
                </div>
            </div>

            <div class="col-md-6">
                <h1 class="fw-bold">{{ p.name }}</h1>
                <div class="price-tag mb-4">
                    {% if p.price > 0 %} R$ {{ "%.2f"|format(p.price) }} {% else %} Consultar valor {% endif %}
                </div>
                <h5 class="fw-bold">Descrição:</h5>
                <p class="text-muted fs-5" style="white-space: pre-line;">{{ p.description }}</p>
                <hr>
                <a href="https://wa.me/5511999999999?text=Gostaria de saber mais sobre: {{ p.name }}" target="_blank" class="btn btn-success btn-lg w-100 fw-bold rounded-pill p-3">
                    <i class="bi bi-whatsapp"></i> PEDIR PELO WHATSAPP
                </a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
