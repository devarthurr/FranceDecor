<!DOCTYPE html>
<html>
<head>
    <title>France Decor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar { background-color: #0047BB; }
        .navbar-brand { color: white !important; font-weight: bold; display: flex; align-items: center; }
        .logo { height: 40px; margin-right: 10px; border-radius: 4px; }
        .card-img-top { height: 250px; object-fit: cover; }
        .btn-whatsapp { background-color: #25D366; color: white; border: none; width: 100%; padding: 10px; border-radius: 5px; text-decoration: none; display: inline-block; text-align: center; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{{ url_for('static', filename='logo.jpg') }}" class="logo">
                FRANCE DECOR
            </a>
            <a href="/login" class="btn btn-outline-light btn-sm">Painel</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            {% for p in produtos %}
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <img src="{{ p.image_url }}" class="card-img-top">
                    <div class="card-body">
                        <h5>{{ p.name }}</h5>
                        <p class="text-muted">{{ p.description }}</p>
                        <h4 class="text-primary">R$ {{ "%.2f"|format(p.price) }}</h4>
                        <a href="https://wa.me/5511999999999" class="btn-whatsapp">Pedir pelo WhatsApp</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
