<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRANCE DECOR | Inovação em Decoração</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --azul-france: #0047BB; --gradiente: linear-gradient(135deg, #0047BB 0%, #002e8c 100%); }
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; color: #333; }
        
        /* Header Inovador */
        .navbar { background: var(--gradiente); padding: 25px 0; border-bottom: 4px solid #ffd700; }
        .logo-main { height: 100px; width: auto; border-radius: 15px; border: 3px solid white; transition: 0.4s; }
        .logo-main:hover { transform: scale(1.05); }

        /* Cartões Premium */
        .card-product { border: none; border-radius: 25px; transition: 0.4s all ease; background: white; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .card-product:hover { transform: translateY(-15px); box-shadow: 0 20px 40px rgba(0,71,187,0.15); }
        .img-container { height: 280px; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .card-product:hover .img-container img { transform: scale(1.1); }

        /* Botões Estilizados */
        .btn-action { border-radius: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 12px; transition: 0.3s; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-whatsapp { background-color: #25D366; color: white; border: none; }
        .btn-whatsapp:hover { background-color: #1ea952; color: white; transform: scale(1.02); }
        .btn-insta { background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); color: white; }
        .btn-insta:hover { opacity: 0.9; color: white; transform: scale(1.02); }

        .price-tag { color: var(--azul-france); font-size: 1.6rem; font-weight: 800; }
        footer { background: #1a1a1a; color: white; padding: 40px 0; margin-top: 60px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark mb-5 shadow-lg">
        <div class="container text-center">
            <div class="d-flex flex-column align-items-center w-100">
                <img src="{{ url_for('static', filename='logo.jpg') }}" class="logo-main shadow mb-3">
                <h1 class="text-white fw-bold m-0">FRANCE DECOR</h1>
                <p class="text-white-50 small">Requinte e Inovação para o seu ambiente</p>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row row-cols-1 row-cols-md-3 g-5">
            {% for p in produtos %}
            <div class="col">
                <div class="card card-product h-100 p-3">
                    <div class="img-container rounded-4">
                        <img src="{{ p.image_url }}" alt="{{ p.name }}">
                    </div>
                    <div class="card-body px-0 pb-0">
                        <h5 class="fw-bold mb-1">{{ p.name }}</h5>
                        <p class="text-muted small mb-3">{{ p.description }}</p>
                        <div class="price-tag mb-3">R$ {{ "%.2f"|format(p.price) }}</div>
                        
                        <a href="https://wa.me/5511999999999?text=Olá! Gostaria de informações sobre o produto: {{ p.name }}" class="btn-action btn-whatsapp">
                            <i class="bi bi-whatsapp fs-5"></i> Comprar agora
                        </a>
                        <a href="https://www.instagram.com/_france.decor/" target="_blank" class="btn-action btn-insta">
                            <i class="bi bi-instagram fs-5"></i> @_france.decor
                        </a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <footer>
        <div class="container text-center">
            <h5 class="fw-bold mb-3">FRANCE DECOR</h5>
            <div class="d-flex justify-content-center gap-4 fs-3">
                <a href="https://www.instagram.com/_france.decor/" class="text-white"><i class="bi bi-instagram"></i></a>
                <a href="https://wa.me/5511999999999" class="text-white"><i class="bi bi-whatsapp"></i></a>
            </div>
            <p class="mt-4 small text-muted">&copy; 2026 France Decor. Todos os direitos reservados.</p>
        </div>
    </footer>

</body>
</html>
