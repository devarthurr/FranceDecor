<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRANCE DECOR | Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --azul: #0047BB; --gold: #D4AF37; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .navbar { 
            background: linear-gradient(rgba(0, 71, 187, 0.95), rgba(0, 46, 140, 0.95)); 
            padding: 40px 0;
            border-bottom: 3px solid var(--gold);
        }
        .logo-main { 
            height: 160px; /* Logo Aumentada */
            border-radius: 25px; 
            border: 5px solid white; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            transition: 0.5s;
        }
        .logo-main:hover { transform: rotate(2deg) scale(1.05); }

        .card-product { 
            border: none; border-radius: 35px; background: white; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.05); transition: 0.4s;
            border: 1px solid rgba(0,0,0,0.03);
        }
        .card-product:hover { transform: translateY(-15px); box-shadow: 0 20px 50px rgba(0,71,187,0.1); }
        
        /* Botões no Topo do Card */
        .social-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-social {
            flex: 1; padding: 12px; border-radius: 15px; color: white;
            text-decoration: none; font-weight: 800; font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-wa { background-color: #25D366; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }
        .btn-ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #bc1888); box-shadow: 0 4px 15px rgba(220, 39, 67, 0.3); }

        .price-tag { color: var(--azul); font-size: 2rem; font-weight: 900; letter-spacing: -1px; }
        .admin-float { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark mb-5 text-center">
        <div class="container">
            <img src="{{ url_for('static', filename='logo.jpg') }}" class="logo-main mb-3">
            <h1 class="text-white fw-bold display-4">FRANCE DECOR</h1>
            <p class="text-white-50 fs-5">Exclusividade e Design</p>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row row-cols-1 row-cols-md-3 g-5">
            {% for p in produtos %}
            <div class="col">
                <div class="card card-product h-100 p-4">
                    <img src="{{ p.image_url }}" class="rounded-5 mb-4 shadow-sm" style="height: 320px; object-fit: cover;">
                    
                    <div class="text-center">
                        <div class="price-tag mb-3">R$ {{ "%.2f"|format(p.price) }}</div>
                        
                        <div class="social-buttons">
                            <a href="https://wa.me/5511999999999?text=Olá! Vi o produto {{ p.name }} no catálogo." class="btn-social btn-wa">
                                <i class="bi bi-whatsapp"></i> WHATSAPP
                            </a>
                            <a href="https://www.instagram.com/_france.decor/" target="_blank" class="btn-social btn-ig">
                                <i class="bi bi-instagram"></i> INSTAGRAM
                            </a>
                        </div>

                        <h4 class="fw-bold text-dark">{{ p.name }}</h4>
                        <p class="text-muted">{{ p.description }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="admin-float">
        <a href="/login" class="btn btn-dark rounded-pill px-4 py-2 shadow-lg fw-bold">
            <i class="bi bi-shield-lock"></i> ADMIN
        </a>
    </div>

</body>
</html>
