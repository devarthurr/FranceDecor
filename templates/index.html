<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>France Decor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --cor-logo: #0047BB; }
        .navbar { background-color: var(--cor-logo); }
        .navbar-brand { font-weight: bold; display: flex; align-items: center; }
        .logo-img { height: 40px; margin-right: 12px; border-radius: 4px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-whats { background-color: #25D366; color: white; font-weight: bold; width: 100%; border-radius: 10px; padding: 10px; text-decoration: none; display: block; text-align: center; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{{ url_for('static', filename='logo.jpg') }}" class="logo-img">
                FRANCE DECOR
            </a>
            <a href="/login" class="btn btn-outline-light btn-sm">Admin</a>
        </div>
    </nav>

    <div class="container">
        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for p in produtos %}
            <div class="col">
                <div class="card h-100 p-2">
                    <img src="{{ p.image_url }}" class="card-img-top rounded" style="height:250px; object-fit:cover;">
                    <div class="card-body">
                        <h5 class="fw-bold">{{ p.name }}</h5>
                        <p class="text-muted">{{ p.description }}</p>
                        <h4 class="text-primary fw-bold">R$ {{ "%.2f"|format(p.price) }}</h4>
                        <a href="https://wa.me/5511999999999?text=Quero saber mais sobre {{ p.name }}" class="btn-whats">Pedir no WhatsApp</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
