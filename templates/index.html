<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>France Decor | Catálogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --azul: #0047BB; --gold: #D4AF37; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Roboto, sans-serif; }

        /* Header: Logo ao lado do nome + Instagram na direita */
        .navbar { 
            background-color: var(--azul);
            padding: 20px 0;
            border-bottom: 3px solid var(--gold);
        }
        .navbar-brand { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            text-decoration: none;
        }
        .logo-nav { 
            height: 80px; /* Logo aumentada conforme pedido */
            border-radius: 12px;
            border: 2px solid white;
        }
        .brand-name { 
            color: white; 
            font-weight: 800; 
            font-size: 1.8rem; 
            margin: 0;
            letter-spacing: 1px;
        }
        .insta-link {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.3s;
        }
        .insta-link:hover { opacity: 0.8; color: #ffd700; }

        /* Cards de Produto */
        .card-product { 
            border: none; 
            border-radius: 20px; 
            background: white; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            transition: 0.3s;
        }
        
        /* Ajuste para a imagem NÃO ser cortada */
        .img-container {
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            padding: 10px;
        }
        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Foto inteira sempre */
        }

        .product-title { font-weight: 700; color: #333; margin: 10px 0 5px 0; }
        .price-tag { color: var(--azul); font-weight: 800; font-size: 1.25rem; margin-bottom: 15px; }
        
        .btn-wa { 
            background-color: #25D366; 
            color: white; 
            font-weight: bold; 
            border-radius: 10px; 
            padding: 12px;
            text-decoration: none;
            display: block;
            text-align: center;
        }
        .btn-wa:hover { background-color: #1ea952; color: white; }

        @media (max-width: 576px) {
            .brand-name { font-size: 1.3rem; }
            .logo-nav { height: 60px; }
            .navbar .container { flex-direction: row; justify-content: space-between; }
        }
    </style>
</head>
<body>

    <nav class="navbar mb-5">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand" href="/">
                <img src="{{ url_for('static', filename='logo.jpg') }}" class="logo-nav">
                <h1 class="brand-name">FRANCE DECOR</h1>
            </a>
            
            <a href="https://www.instagram.com/_france.decor/" target="_blank" class="insta-link">
                Instagram
            </a>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for p in produtos %}
            <div class="col">
                <div class="card card-product h-100 p-3">
                    <div class="img-container">
                        <img src="{{ p.image_url }}" alt="{{ p.name }}">
                    </div>
                    
                    <div class="card-body text-center d-flex flex-column justify-content-between">
                        <div>
                            <h5 class="product-title">{{ p.name }}</h5>
                            <div class="price-tag">
                                {% if p.price and p.price > 0 %}
                                    R$ {{ "%.2f"|format(p.price) }}
                                {% else %}
                                    Consultar Valor
                                {% endif %}
                            </div>
                        </div>
                        
                        <p class="text-muted small">{{ p.description }}</p>
                        
                        <a href="https://wa.me/5511999999999?text=Olá! Gostaria de saber mais sobre: {{ p.name }}" class="btn-wa">
                            <i class="bi bi-whatsapp me-1"></i> Chamar no WhatsApp
                        </a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
