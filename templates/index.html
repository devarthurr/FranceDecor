<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Loja - FranceDecor</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: auto; padding: 20px; }
        .produto { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        .btn { background: #0070f3; color: white; padding: 10px; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Produtos Cadastrados</h1>
    <a href="/cadastro" class="btn"> + Adicionar Novo Produto</a>
    <br><br>
    {% for produto in produtos %}
    <div class="produto">
        <h3>{{ produto.nome }}</h3>
        <p>{{ produto.descricao }}</p>
        <p><strong>Preço:</strong> R$ {{ produto.preco }} | <strong>Estoque:</strong> {{ produto.estoque }}</p>
        <small>Categoria: {{ produto.categoria }}</small>
    </div>
    {% endfor %}
</body>
</html>
