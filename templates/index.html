<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRANCE DECOR | Catálogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --azul: #0047BB; --gold: #D4AF37; }
        body { background-color: #f4f6f9; font-family: 'Segoe UI', system-ui, sans-serif; overflow-x: hidden; }
        
        /* Navbar Compacta e Responsiva */
        .navbar { 
            background: linear-gradient(rgba(0, 71, 187, 0.98), rgba(0, 46, 140, 0.98)); 
            padding: 20px 0;
            border-bottom: 3px solid var(--gold);
        }
        .logo-main { 
            height: 100px; /* Reduzi um pouco para caber melhor no celular */
            width: auto;
            border-radius: 15px; 
            border: 3px solid white; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        @media (max-width: 576px) {
            .logo-main { height: 80px; } /* Menor ainda no celular */
            h1 { font-size: 1.5rem !important; }
        }

        /* Card Ajustado para Telas Menores */
        .card-product { 
            border: none; 
            border-radius: 20px; 
            background: white; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: 0.3s;
            margin-bottom: 10px;
        }
        .img-product {
            width: 100%;
            height: 220px; /* Altura fixa para não quebrar o layout */
            object-fit: cover;
            border-radius: 15px;
        }

        /* Botões Sociais Compactos */
        .social-buttons { display: flex; gap: 8px; margin-bottom: 12px; }
        .btn-social {
            flex: 1; padding: 10px 5px; border-radius: 10px; color: white;
            text-decoration: none; font-weight: 700; font-size: 0.75rem; /* Fonte menor para mobile */
            display: flex; align-items: center; justify-content: center; gap: 5px;
            white-space: nowrap;
        }
        .btn-wa { background-color: #25D366; }
        .btn-ig { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }

        .price-tag { color: var(--azul); font-size: 1.4rem; font-weight: 800; }
        .admin-float { position: fixed; bottom: 15px; right: 15px; z-index: 1000; }
        .admin-float .btn { font-size: 0.8rem; padding: 8px 15px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark mb-4 text-center">
        <div class="container px-3">
            <img src="{{ url_for('static', filename='logo.jpg') }}" class="logo-main mb-2">
            <h1 class="text-white fw-bold mb-0">FRANCE DECOR</h1>
            <p class="text-white-50 small mb-0">Decoração Premium</p>
        </div>
    </nav>

    <div class="container px-3 pb-5">
        <div class="row row-cols-1 row-cols-md-3 g-3">
            {% for p in produtos %}
            <div class="col">
                <div class="card card-product h-100 p-3">
                    <img src="{{ p.image_url }}" class="img-product mb-3 shadow-sm">
                    
                    <div class="text-center">
                        <div class="price-tag mb-2">R$ {{ "%.2f"|format(p.price) }}</div>
                        
                        <div class="social-buttons">
                            <a href="https://wa.me/5511999999999?text=Interesse no produto: {{ p.name }}" class="btn-social btn-wa">
                                <i class="bi bi-whatsapp"></i> WHATSAPP
                            </a>
                            <a href="https://www.instagram.com/_france.decor/" target="_blank" class="btn-social btn-ig">
                                <i class="bi bi-instagram"></i> INSTAGRAM
                            </a>
                        </div>

                        <h6 class="fw-bold text-dark mb-1">{{ p.name }}</h6>
                        <p class="text-muted mb-0" style="font-size: 0.85rem;">{{ p.description }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="admin-float">
        <a href="/login" class="btn btn-dark rounded-pill shadow-lg opacity-75">
            <i class="bi bi-lock"></i>
        </a>
    </div>

</body>
</html>
