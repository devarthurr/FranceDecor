<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>France Decor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar { background-color: #0047BB; }
        .navbar-brand { color: white !important; font-weight: bold; display: flex; align-items: center; }
        .logo-img { height: 40px; margin-right: 12px; border-radius: 4px; }
        .btn-whatsapp { background-color: #25D366; color: white; width: 100%; border-radius: 8px; text-decoration: none; display: block; text-align: center; padding: 10px; font-weight: bold; }
        .card { border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 12px; overflow: hidden; }
        .card-img-top { height: 220px; object-fit: cover; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{{ url_for('static', filename='logo.jpg') }}" class="logo-img">
                FRANCE DECOR
            </a>
            <a href="/login" class="btn btn-outline-light btn-sm">Acesso Restrito</a>
        </div>
    </nav>

    <div class="container">
        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for p in produtos %}
            <div class="col">
                <div class="card h-100">
                    <img src="{{ p.image_url }}" class="card-img-top" alt="{{ p.name }}">
                    <div class="card-body">
                        <h5 class="fw-bold">{{ p.name }}</h5>
                        <p class="text-muted small">{{ p.description }}</p>
                        <h4 class="text-primary">R$ {{ "%.2f"|format(p.price) }}</h4>
                        <a href="https://wa.me/5511999999999?text=Gostei do produto: {{ p.name }}" class="btn-whatsapp">Pedir no WhatsApp</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
