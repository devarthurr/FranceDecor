<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRANCE DECOR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar navbar-custom mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{{ url_for('static', filename='logo.jpg') }}" class="logo-img">
                FRANCE DECOR
            </a>
            <a href="/login" class="btn btn-outline-light btn-sm">Admin</a>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            {% for p in products %}
            <div class="col-md-3">
                <div class="card h-100 product-card">
                    <img src="{{ p.image_url }}" class="card-img-top" style="height: 200px; object-fit: cover;">
                    <div class="card-body">
                        <h6 class="fw-bold">{{ p.name }}</h6>
                        <p class="small text-muted">{{ p.description }}</p>
                        <h5 class="text-primary">{% if p.price %}R$ {{ "%.2f"|format(p.price) }}{% else %}Sob consulta{% endif %}</h5>
                        <a href="https://wa.me/5511999999999?text=Quero o produto {{ p.name }}" class="btn-whatsapp">WhatsApp</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
