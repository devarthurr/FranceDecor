<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRANCE DECOR | Catálogo Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --azul: #0047BB; --gold: #D4AF37; }
        body { background-color: #f8f9fa; font-family: 'Poppins', sans-serif; }

        /* Header com Nome 3D e Instagram */
        .navbar { 
            background: linear-gradient(135deg, #0047BB 0%, #002e8c 100%);
            padding: 30px 0;
            border-bottom: 4px solid var(--gold);
        }
        .logo-main { 
            height: 130px; 
            width: auto;
            border-radius: 20px;
            border: 4px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }
        .nome-3d {
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 
                0 1px 0 #ccc, 0 2px 0 #c9c9c9, 0 3px 0 #bbb, 
                0 4px 0 #b9b9b9, 0 5px 0 #aaa, 0 6px 1px rgba(0,0,0,.1), 
                0 0 5px rgba(0,0,0,.1), 0 1px 3px rgba(0,0,0,.3), 
                0 3px 5px rgba(0,0,0,.2), 0 5px 10px rgba(0,0,0,.25);
            font-size: 2.5rem;
        }
        .insta-top {
            display: inline-flex;
            align-items: center;
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            backdrop-filter: blur(5px);
            margin-top: 15px;
            border: 1px solid rgba(255,255,255,0.3);
            transition: 0.3s;
        }
        .insta-top:hover { background: white; color: var(--azul); }

        /* Card de Produto Ajustado */
        .card-product { 
            border: none; 
            border-radius: 25px; 
            background: white; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: 0.3s;
        }
        /* Ajuste para não cortar a imagem */
        .img-wrapper {
            background-color: #fff;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .img-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Não corta a imagem */
        }

        .product-title { font-weight: 700; color: #333; margin-top: 10px; }
        .price-tag { color: var(--azul); font-weight: 800; font-size: 1.3rem; margin-bottom: 15px; }
        .btn-wa { 
            background-color: #25D366; 
            color: white; 
            font-weight: bold; 
            border-radius: 12px; 
            padding: 12px;
            text-decoration: none;
            display: block;
            transition: 0.3s;
        }
        .btn-wa:hover { background-color: #1ea952; color: white; transform: scale(1.02); }

        @media (max-width: 576px) {
            .nome-3d { font-size: 1.8rem; }
            .logo-main { height: 100px; }
        }
    </style>
</head>
<body>

    <nav class="navbar text-center mb-5">
        <div class="container d-flex flex-column align-items-center">
            <img src="{{ url_for('static', filename='logo.jpg') }}" class="logo-main shadow">
            <div class="nome-3d">France Decor</div>
            <a href="https://www.instagram.com/_france.decor/" target="_blank" class="insta-top">
                <i class="bi bi-instagram me-2"></i> @_france.decor
            </a>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for p in produtos %}
            <div class="col">
                <div class="card card-product h-100 p-3">
                    <div class="img-wrapper">
                        <img src="{{ p.image_url }}" alt="{{ p.name }}">
                    </div>
                    
                    <div class="card-body text-center d-flex flex-column justify-content-between">
                        <div>
                            <h5 class="product-title">{{ p.name }}</h5>
                            <div class="price-tag">
                                {% if p.price and p.price > 0 %}
                                    R$ {{ "%.2f"|format(p.price) }}
                                {% else %}
                                    Consultar Valor
                                {% endif %}
                            </div>
                        </div>
                        
                        <p class="text-muted small mb-3">{{ p.description }}</p>
                        
                        <a href="https://wa.me/5511999999999?text=Olá! Gostaria de saber mais sobre o produto: {{ p.name }}" class="btn-wa">
                            <i class="bi bi-whatsapp me-2"></i> Solicitar Orçamento
                        </a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
