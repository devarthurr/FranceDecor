<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRANCE DECOR | Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --azul-france: #0047BB; }
        body { background-color: #f0f2f5; font-family: 'Poppins', sans-serif; }
        
        /* Navbar de Vidro */
        .navbar { 
            background: rgba(0, 71, 187, 0.9); 
            backdrop-filter: blur(10px);
            padding: 30px 0;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .logo-main { 
            height: 140px; /* Aumentado conforme pedido */
            border-radius: 20px; 
            border: 4px solid white; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Cartão de Produto */
        .card-product { 
            border: none; 
            border-radius: 30px; 
            background: white; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .card-product:hover { transform: translateY(-10px); }
        
        /* Botões no Topo do Conteúdo */
        .btn-group-social {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .btn-social {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: 0.3s;
        }
        .btn-wa { background-color: #25D366; }
        .btn-ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #bc1888); }
        .btn-social:hover { opacity: 0.8; color: white; transform: scale(1.03); }

        .price-tag { color: var(--azul-france); font-size: 1.8rem; font-weight: 850; margin-bottom: 5px; }
        .admin-access { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark mb-5 sticky-top">
        <div class="container text-center">
            <div class="d-flex flex-column align-items-center w-100">
                <img src="{{ url_for('static', filename='logo.jpg') }}" class="logo-main mb-3">
                <h1 class="text-white fw-bold display-5">FRANCE DECOR</h1>
                <p class="text-white-50">Sofisticação em cada detalhe</p>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for p in produtos %}
            <div class="col">
                <div class="card card-product h-100 overflow-hidden p-3">
                    <img src="{{ p.image_url }}" class="rounded-4 mb-3" style="height: 300px; object-fit: cover;">
                    
                    <div class="card-body p-0 text-center">
                        <div class="price-tag">R$ {{ "%.2f"|format(p.price) }}</div>
                        
                        <div class="btn-group-social">
                            <a href="https://wa.me/5511999999999?text=Quero comprar: {{ p.name }}" class="btn-social btn-wa">
                                <i class="bi bi-whatsapp"></i> WhatsApp
                            </a>
