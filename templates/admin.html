<!DOCTYPE html>
<html>
<head>
    <title>Painel France Decor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light p-4">
    <div class="container">
        <div class="d-flex justify-content-between mb-4 bg-white p-3 rounded-4 shadow-sm">
            <h3 class="fw-bold m-0 text-primary">Gerenciar Catálogo</h3>
            <a href="/" class="btn btn-outline-secondary">Ver Site</a>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
                    <h5 class="fw-bold mb-3">Adicionar Produto</h5>
                    <form method="POST">
                        <input type="text" name="name" placeholder="Nome do Produto" class="form-control mb-2" required>
                        <input type="text" name="price" placeholder="Preço (0 para Consultar)" class="form-control mb-2">
                        <textarea name="image_urls" placeholder="Cole os links das fotos aqui (separe por vírgula)" class="form-control mb-2" rows="3"></textarea>
                        <textarea name="description" placeholder="Descrição" class="form-control mb-3"></textarea>
                        <button class="btn btn-primary w-100 fw-bold">SALVAR</button>
                    </form>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Preço</th>
                                <th class="text-end">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for p in produtos %}
                            <tr>
                                <td>{{ p.name }}</td>
                                <td>{{ "R$ %.2f"|format(p.price) if p.price > 0 else "Consultar" }}</td>
                                <td class="text-end">
                                    <a href="/admin/edit/{{p.id}}" class="btn btn-sm btn-warning me-1">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a href="/delete/{{ p.id }}" class="btn btn-sm btn-danger">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
