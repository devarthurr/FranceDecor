<!DOCTYPE html>
<html>
<head>
    <title>Admin - France Decor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4 bg-light">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Painel France Decor</h2>
            <a href="/logout" class="btn btn-danger">Sair</a>
        </div>

        <div class="card p-4 shadow-sm mb-5">
            <h5 class="mb-3">Novo Produto</h5>
            <form method="POST">
                <div class="row g-2">
                    <div class="col-md-6"><input type="text" name="name" placeholder="Nome" class="form-control" required></div>
                    <div class="col-md-6"><input type="text" name="price" placeholder="Preço (ex: 120,00)" class="form-control"></div>
                    <div class="col-12"><input type="text" name="image_url" placeholder="URL da Imagem" class="form-control"></div>
                    <div class="col-12"><textarea name="description" placeholder="Descrição curta" class="form-control"></textarea></div>
                    <div class="col-12"><button class="btn btn-primary w-100">Salvar Produto</button></div>
                </div>
            </form>
        </div>

        <div class="list-group shadow-sm">
            {% for p in produtos %}
            <div class="list-group-item d-flex justify-content-between align-items-center">
                <span><strong>{{ p.name }}</strong> - R$ {{ p.price }}</span>
                <a href="/delete/{{ p.id }}" class="btn btn-sm btn-outline-danger">Excluir</a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
