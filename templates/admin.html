<!DOCTYPE html>
<html>
<head>
    <title>Admin France Decor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-3">
    <div class="container">
        <div class="d-flex justify-content-between mb-4">
            <h3>Gerenciar Produtos</h3>
            <a href="/logout" class="btn btn-danger">Sair</a>
        </div>
        <div class="card p-3 shadow-sm mb-4">
            <form method="POST">
                <input type="text" name="name" placeholder="Nome do Produto" class="form-control mb-2" required>
                <input type="text" name="price" placeholder="Preço (ex: 150,00)" class="form-control mb-2">
                <textarea name="image_urls" placeholder="Links das imagens (separe por vírgula)" class="form-control mb-2" rows="2"></textarea>
                <textarea name="description" placeholder="Descrição completa" class="form-control mb-3"></textarea>
                <button class="btn btn-primary w-100 fw-bold">ADICIONAR PRODUTO</button>
            </form>
        </div>
        <div class="list-group">
            {% for p in produtos %}
            <div class="list-group-item d-flex justify-content-between align-items-center">
                <span>{{ p.name }}</span>
                <div>
                    <a href="/admin/edit/{{p.id}}" class="btn btn-sm btn-warning">Editar</a>
                    <a href="/delete/{{p.id}}" class="btn btn-sm btn-danger">Excluir</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
