<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin | France Decor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light p-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded-4 shadow-sm">
            <h3 class="fw-bold m-0 text-primary">Gerenciar Catálogo</h3>
            <div>
                <a href="/" class="btn btn-outline-secondary me-2">Ver Site</a>
                <a href="/logout" class="btn btn-danger">Sair</a>
            </div>
        </div>

        <div class="row">
            <div class="col-md-5">
                <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
                    <h5 class="fw-bold mb-3">Novo Produto</h5>
                    <form method="POST">
                        <input type="text" name="name" placeholder="Nome do Produto" class="form-control mb-2" required>
                        <input type="text" name="price" placeholder="Preço (ex: 150,00 ou 0 para Consultar)" class="form-control mb-2">
                        <textarea name="image_urls" placeholder="Links das imagens (separe por vírgula)" class="form-control mb-2" rows="3"></textarea>
                        <textarea name="description" placeholder="Descrição completa" class="form-control mb-3" rows="3"></textarea>
                        <button class="btn btn-primary w-100 fw-bold py-2">ADICIONAR AO SITE</button>
                    </form>
                </div>
            </div>
            <div class="col-md-7">
                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Preço</th>
                                <th class="text-end">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for p in produtos %}
                            <tr>
                                <td>{{ p.name }}</td>
                                <td class="fw-bold">R$ {{ p.price }}</td>
                                <td class="text-end">
                                    <a href="/admin/edit/{{p.id}}" class="btn btn-sm btn-warning me-1"><i class="bi bi-pencil"></i></a>
                                    <a href="/delete/{{p.id}}" class="btn btn-sm btn-danger"><i class="bi bi-trash"></i></a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
