<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin | France Decor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container" style="max-width: 900px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Painel de Controle</h2>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Sair</a>
        </div>

        <div class="card border-0 shadow-sm p-4 mb-4" style="border-radius: 15px;">
            <h5 class="fw-bold mb-3">Adicionar Novo Produto</h5>
            <form method="POST">
                <div class="row g-2">
                    <div class="col-md-8">
                        <input type="text" name="name" placeholder="Nome do Produto" class="form-control mb-2" required>
                    </div>
                    <div class="col-md-4">
                        <input type="text" name="price" placeholder="Preço (ex: 150,00)" class="form-control mb-2">
                    </div>
                </div>
                <textarea name="image_urls" placeholder="Links das fotos (separe por vírgula)" class="form-control mb-2" rows="2"></textarea>
                <textarea name="description" placeholder="Descrição Detalhada" class="form-control mb-3" rows="3"></textarea>
                <button class="btn btn-primary w-100 fw-bold">PUBLICAR NO SITE</button>
            </form>
        </div>

        <div class="bg-white shadow-sm rounded-4 overflow-hidden">
            <table class="table mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">Produto</th>
                        <th class="text-end pe-4">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in produtos %}
                    <tr>
                        <td class="ps-4 fw-semibold">{{ p.name }}</td>
                        <td class="text-end pe-4">
                            <a href="/admin/edit/{{p.id}}" class="btn btn-sm btn-warning">Editar</a>
                            <a href="/delete/{{p.id}}" class="btn btn-sm btn-danger">Excluir</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
