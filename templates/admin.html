<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light p-4">
    <div class="container" style="max-width: 800px;">
        <div class="d-flex justify-content-between mb-4 align-items-center">
            <h3>Admin France Decor</h3>
            <a href="/logout" class="btn btn-danger btn-sm">Sair</a>
        </div>
        <div class="card p-4 shadow-sm border-0 mb-4 rounded-4">
            <form method="POST">
                <input type="text" name="name" placeholder="Nome do Produto" class="form-control mb-2" required>
                <input type="text" name="price" placeholder="Preço (ex: 150.00)" class="form-control mb-2">
                <textarea name="image_urls" placeholder="Links das fotos (separados por vírgula)" class="form-control mb-2" rows="2"></textarea>
                <textarea name="description" placeholder="Descrição" class="form-control mb-3" rows="3"></textarea>
                <button class="btn btn-primary w-100 fw-bold shadow">CADASTRAR PRODUTO</button>
            </form>
        </div>
        <div class="list-group shadow-sm">
            {% for p in produtos %}
            <div class="list-group-item d-flex justify-content-between align-items-center border-0 mb-2 rounded-3">
                <span>{{ p.name }}</span>
                <div>
                    <a href="/admin/edit/{{p.id}}" class="btn btn-warning btn-sm">Editar</a>
                    <a href="/delete/{{p.id}}" onclick="return confirm('Excluir?')" class="btn btn-danger btn-sm">Excluir</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
