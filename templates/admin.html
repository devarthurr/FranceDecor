<!DOCTYPE html>
<html>
<head>
    <title>Admin - France Decor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
    <div class="container">
        <div class="d-flex justify-content-between mb-4">
            <h2>Gerenciar Catálogo</h2>
            <a href="/logout" class="btn btn-danger">Sair</a>
        </div>

        <div class="card p-4 mb-4">
            <form method="POST">
                <input type="text" name="name" placeholder="Nome do Produto" class="form-control mb-2" required>
                <input type="text" name="price" placeholder="Preço (Ex: 150.00)" class="form-control mb-2">
                <input type="text" name="image_url" placeholder="URL da Imagem" class="form-control mb-2">
                <textarea name="description" placeholder="Descrição" class="form-control mb-2"></textarea>
                <button class="btn btn-success w-100">Adicionar Produto</button>
            </form>
        </div>

        <table class="table">
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Preço</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody>
                {% for p in produtos %}
                <tr>
                    <td>{{ p.name }}</td>
                    <td>R$ {{ p.price }}</td>
                    <td><a href="/delete/{{ p.id }}" class="btn btn-sm btn-outline-danger">Excluir</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
