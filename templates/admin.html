<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
    <nav class="navbar navbar-custom mb-4 py-3">
        <div class="container">
            <span class="navbar-brand"><img src="{{ url_for('static', filename='logo.jpg') }}" class="logo-img"> Gestão</span>
            <div>
                <a href="/" class="btn btn-light btn-sm me-2">Ver Site</a>
                <a href="/logout" class="btn btn-danger btn-sm">Sair</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="mb-4">Adicionar Produto</h5>
                        <form method="POST">
                            <input type="text" name="name" class="form-control mb-3" placeholder="Nome do Produto" required>
                            <input type="text" name="category" class="form-control mb-3" placeholder="Categoria (ex: Vasos)">
                            <input type="number" step="0.01" name="price" class="form-control mb-3" placeholder="Preço (Deixe vazio p/ Sob Consulta)">
                            <input type="url" name="image_url" class="form-control mb-3" placeholder="URL da Imagem">
                            <textarea name="description" class="form-control mb-3" rows="2" placeholder="Descrição rápida"></textarea>
                            <button type="submit" class="btn btn-dark w-100">Salvar</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <ul class="list-group list-group-flush">
                        {% for product in products %}
                        <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                            <div>
                                <span class="badge bg-secondary me-2">{{ product.category }}</span>
                                <strong>{{ product.name }}</strong>
                            </div>
                            <a href="/admin/delete/{{ product.id }}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
                        </li>
                        {% endfor %}
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
