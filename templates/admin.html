<!DOCTYPE html>
<html>
<head>
    <title>Painel Administrativo | France Decor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light p-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded-4 shadow-sm">
            <h3 class="fw-bold m-0 text-primary">Gerenciar Produtos</h3>
            <div>
                <a href="/" class="btn btn-outline-secondary me-2">Ver Site</a>
                <a href="/logout" class="btn btn-danger">Sair</a>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
                    <h5 class="fw-bold mb-3">Novo Item</h5>
                    <form method="POST">
                        <input type="text" name="name" placeholder="Nome do Produto" class="form-control mb-2" required>
                        <input type="text" name="price" placeholder="Preço (ex: 199,90)" class="form-control mb-2">
                        <input type="text" name="image_url" placeholder="URL da Imagem" class="form-control mb-2">
                        <textarea name="description" placeholder="Descrição" class="form-control mb-3" rows="3"></textarea>
                        <button class="btn btn-primary w-100 fw-bold">SALVAR PRODUTO</button>
                    </form>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Preço</th>
                                <th class="text-end">Ação</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for p in produtos %}
                            <tr>
                                <td>{{ p.name }}</td>
                                <td class="fw-bold text-primary">R$ {{ p.price }}</td>
                                <td class="text-end">
                                    <a href="/delete/{{ p.id }}" class="btn btn-sm btn-outline-danger">Excluir</a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
