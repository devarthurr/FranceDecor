<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light p-4">
    <div class="container" style="max-width: 800px;">
        <div class="d-flex justify-content-between mb-4 align-items-center">
            <h3 class="fw-bold m-0">Painel France Decor</h3>
            <a href="/logout" class="btn btn-danger btn-sm">Sair</a>
        </div>
        <div class="card p-4 shadow-sm border-0 mb-4 rounded-4">
            <h5 class="fw-bold mb-3">Novo Produto</h5>
            <form method="POST" enctype="multipart/form-data">
                <input type="text" name="name" placeholder="Nome do Produto" class="form-control mb-2" required>
                <input type="text" name="price" placeholder="Preço (ex: 150,00)" class="form-control mb-2">
                
                <label class="small fw-bold text-primary mt-2">Escolha as fotos (elas serão salvas no VS Code):</label>
                <input type="file" name="fotos" class="form-control mb-3" multiple required>
                
                <textarea name="description" placeholder="Descrição Detalhada" class="form-control mb-3" rows="3"></textarea>
                <button class="btn btn-primary w-100 fw-bold">SALVAR PRODUTO</button>
            </form>
        </div>
        <div class="list-group">
            {% for p in produtos %}
            <div class="list-group-item d-flex justify-content-between align-items-center border-0 mb-2 shadow-sm rounded-3">
                <span>{{ p.name }}</span>
                <a href="/delete/{{p.id}}" class="btn btn-sm btn-outline-danger">Excluir</a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
