<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin | France Decor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light p-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white rounded-4 shadow-sm">
            <h3 class="fw-bold m-0">Administração</h3>
            <a href="/logout" class="btn btn-danger">Sair</a>
        </div>
        <div class="row">
            <div class="col-md-5">
                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <h5 class="fw-bold mb-3">Novo Produto</h5>
                    <form method="POST">
                        <input type="text" name="name" placeholder="Nome" class="form-control mb-2" required>
                        <input type="text" name="price" placeholder="Preço (ex: 120,00)" class="form-control mb-2">
                        <textarea name="image_urls" placeholder="Links das fotos (separados por vírgula)" class="form-control mb-2" rows="3"></textarea>
                        <textarea name="description" placeholder="Descrição" class="form-control mb-3" rows="3"></textarea>
                        <button class="btn btn-primary w-100 fw-bold">SALVAR NO CATÁLOGO</button>
                    </form>
                </div>
            </div>
            <div class="col-md-7">
                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <table class="table align-middle">
                        <thead>
                            <tr><th>Item</th><th class="text-end">Ações</th></tr>
                        </thead>
                        <tbody>
                            {% for p in produtos %}
                            <tr>
                                <td>{{ p.name }}</td>
                                <td class="text-end">
                                    <a href="/admin/edit/{{p.id}}" class="btn btn-sm btn-warning">Editar</a>
                                    <a href="/delete/{{p.id}}" class="btn btn-sm btn-danger">Excluir</a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
