<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Produto</title>
    <style>
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; display: block; }
        body { font-family: sans-serif; max-width: 400px; margin: auto; padding: 20px; }
    </style>
</head>
<body>
    <h2>Cadastrar Produto</h2>
    <form action="/adicionar" method="POST">
        <input type="text" name="nome" placeholder="Nome do produto" required>
        <textarea name="descricao" placeholder="Descrição"></textarea>
        <input type="number" step="0.01" name="preco" placeholder="Preço (ex: 99.90)" required>
        <input type="number" name="estoque" placeholder="Quantidade em estoque" required>
        <input type="text" name="categoria" placeholder="Categoria">
        <button type="submit" style="width: 100%; padding: 10px; background: green; color: white; border: none; cursor: pointer;">Salvar no Banco</button>
    </form>
    <br>
    <a href="/">Voltar</a>
</body>
</html>
