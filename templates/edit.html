<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar | France Decor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container card shadow p-4 rounded-4" style="max-width: 650px;">
        <h4 class="fw-bold mb-4">Alterar Produto</h4>
        <form method="POST">
            <input type="text" name="name" value="{{p.name}}" class="form-control mb-3" required>
            <input type="text" name="price" value="{{p.price}}" class="form-control mb-3">
            <label class="small fw-bold">Links das Imagens (separe por vírgula):</label>
            <textarea name="image_urls" class="form-control mb-3" rows="6" required>{{p.image_urls}}</textarea>
            <textarea name="description" class="form-control mb-4" rows="4">{{p.description}}</textarea>
            <button class="btn btn-primary w-100 fw-bold py-2">SALVAR ALTERAÇÕES</button>
            <a href="/admin" class="btn btn-link w-100 text-muted mt-2 text-decoration-none">Cancelar</a>
        </form>
    </div>
</body>
</html>
