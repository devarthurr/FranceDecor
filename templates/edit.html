<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light p-5">
    <div class="container card shadow p-4 rounded-4" style="max-width: 600px;">
        <h3 class="fw-bold mb-4 text-center">Editar Produto</h3>
        <form method="POST">
            <label class="small fw-bold">Nome:</label>
            <input type="text" name="name" value="{{p.name}}" class="form-control mb-3" required>
            <label class="small fw-bold">Preço:</label>
            <input type="text" name="price" value="{{p.price}}" class="form-control mb-3">
            <label class="small fw-bold">Links das Imagens (vírgula):</label>
            <textarea name="image_urls" class="form-control mb-3" rows="4">{{p.image_urls}}</textarea>
            <label class="small fw-bold">Descrição:</label>
            <textarea name="description" class="form-control mb-4" rows="4">{{p.description}}</textarea>
            <button class="btn btn-primary w-100 fw-bold">SALVAR ALTERAÇÕES</button>
            <a href="/admin" class="btn btn-link w-100 mt-2 text-muted">Cancelar</a>
        </form>
    </div>
</body>
</html>
