<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar | France Decor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container card border-0 shadow-lg p-4 rounded-4" style="max-width: 600px;">
        <h3 class="fw-bold mb-4 text-center">Editar Produto</h3>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Nome</label>
                <input type="text" name="name" value="{{p.name}}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Preço</label>
                <input type="text" name="price" value="{{p.price}}" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Links das Fotos (separados por vírgula)</label>
                <textarea name="image_urls" class="form-control" rows="4">{{p.image_urls}}</textarea>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Descrição</label>
                <textarea name="description" class="form-control" rows="3">{{p.description}}</textarea>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-primary w-100 fw-bold">SALVAR ALTERAÇÕES</button>
                <a href="/admin" class="btn btn-secondary px-4">CANCELAR</a>
            </div>
        </form>
    </div>
</body>
</html>
