<!DOCTYPE html>
<html>
<head>
    <title>Editar Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container card p-4 shadow-sm" style="max-width: 600px;">
        <h3 class="fw-bold mb-4">Editar Produto</h3>
        <form method="POST">
            <input type="text" name="name" value="{{p.name}}" class="form-control mb-3" required>
            <input type="text" name="price" value="{{p.price}}" class="form-control mb-3">
            <textarea name="image_urls" class="form-control mb-3" rows="3" placeholder="URLs das imagens separadas por vírgula">{{p.image_urls}}</textarea>
            <textarea name="description" class="form-control mb-3">{{p.description}}</textarea>
            <div class="d-flex gap-2">
                <button class="btn btn-primary w-100">SALVAR ALTERAÇÕES</button>
                <a href="/admin" class="btn btn-secondary">CANCELAR</a>
            </div>
        </form>
    </div>
</body>
</html>
