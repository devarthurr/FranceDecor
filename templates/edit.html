<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light p-5"><div class="container card shadow p-4 rounded-4" style="max-width: 600px;">
    <h3>Editar Item</h3>
    <form method="POST">
        <input type="text" name="name" value="{{p.name}}" class="form-control mb-3" required>
        <input type="text" name="price" value="{{p.price}}" class="form-control mb-3">
        <textarea name="image_urls" class="form-control mb-3" rows="4">{{p.image_urls}}</textarea>
        <textarea name="description" class="form-control mb-3" rows="4">{{p.description}}</textarea>
        <button class="btn btn-primary w-100 fw-bold">SALVAR</button>
    </form>
</div></body></html>
