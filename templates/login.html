<!DOCTYPE html>
<html>
<head>
    <title>Login | France Decor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0047BB; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <img src="{{ url_for('static', filename='logo.jpg') }}" height="80" class="mb-4 rounded-3">
        <h3 class="fw-bold mb-4">Painel Administrativo</h3>
        <form method="POST">
            <input type="text" name="username" class="form-control mb-3 py-3" placeholder="Usuário" required>
            <input type="password" name="password" class="form-control mb-4 py-3" placeholder="Senha" required>
            <button class="btn btn-primary w-100 py-3 fw-bold shadow">ENTRAR</button>
        </form>
        <a href="/" class="d-block mt-4 text-muted small">Sair do modo seguro</a>
    </div>
</body>
</html>
