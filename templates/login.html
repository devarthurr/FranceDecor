<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>body { background-color: var(--cor-primaria); }</style>
</head>
<body class="d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card p-4 shadow-lg border-0 rounded-4">
                    <div class="text-center mb-4">
                        <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Logo" style="height: 60px;">
                    </div>
                    <form method="POST">
                        <input type="text" name="username" class="form-control mb-3" placeholder="Usuário" required>
                        <input type="password" name="password" class="form-control mb-4" placeholder="Senha" required>
                        <button type="submit" class="btn btn-dark w-100 py-2">Entrar</button>
                    </form>
                    <a href="/" class="d-block text-center mt-3 text-muted text-decoration-none">Voltar</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
