<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | France Decor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --cor-logo: #0047BB; }
        body { 
            background-color: var(--cor-logo); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .card-login {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
        .logo-login {
            height: 70px;
            margin-bottom: 1.5rem;
            border-radius: 8px;
        }
        .btn-entrar {
            background-color: var(--cor-logo);
            color: white;
            font-weight: bold;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            transition: 0.3s;
        }
        .btn-entrar:hover {
            background-color: #00368e;
            color: white;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
        }
    </style>
</head>
<body>

    <div class="card card-login bg-white text-center">
        <img src="{{ url_for('static', filename='logo.jpg') }}" class="logo-login mx-auto" alt="France Decor">
        
        <h4 class="fw-bold mb-4" style="color: var(--cor-logo);">Acesso Restrito</h4>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger py-2 small">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold text-muted">USUÁRIO</label>
                <input type="text" name="username" class="form-control" placeholder="Digite seu usuário" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold text-muted">SENHA</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-entrar mb-3 shadow-sm">ENTRAR NO PAINEL</button>
        </form>
        
        <a href="/" class="text-muted text-decoration-none small">← Voltar para o Catálogo</a>
    </div>

</body>
</html>
