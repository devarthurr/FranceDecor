<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | France Decor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0047BB; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        .btn-login { background: #0047BB; border: none; font-weight: bold; padding: 12px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <img src="{{ url_for('static', filename='logo.jpg') }}" height="80" class="mb-3 rounded-3">
        <h4 class="fw-bold mb-4">Painel Administrativo</h4>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger small">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" class="form-control mb-3" placeholder="Usuário" required>
            <input type="password" name="password" class="form-control mb-4" placeholder="Senha" required>
            <button class="btn btn-primary btn-login w-100">ENTRAR</button>
        </form>
        <a href="/" class="d-block mt-4 text-muted small text-decoration-none">← Voltar ao site</a>
    </div>
</body>
</html>
