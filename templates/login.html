<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-primary d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card p-4 shadow-lg border-0" style="width: 350px; border-radius: 20px;">
        <h4 class="text-center fw-bold mb-4">FRANCE DECOR</h4>
        <form method="POST">
            <input type="text" name="username" class="form-control mb-2" placeholder="Usuário" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Senha" required>
            <button class="btn btn-primary w-100 fw-bold">ENTRAR</button>
        </form>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="mt-3 text-danger text-center small">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}
    </div>
</body>
</html>
