<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ p.name }} | France Decor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --azul: #0047BB; }
        body { background-color: #fff; font-family: sans-serif; }
        .btn-wa { background-color: #25D366; color: white; font-weight: bold; border-radius: 15px; padding: 15px; text-decoration: none; display: block; text-align: center; font-size: 1.2rem; }
        .carousel-item { height: 450px; background: #f8f9fa; border-radius: 20px; }
        .carousel-item img { max-width: 100%; max-height: 100%; object-fit: contain; margin: auto; display: block; }
        .price-big { color: var(--azul); font-size: 2.5rem; font-weight: 800; }
        .back-link { color: var(--azul); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container py-4">
        <a href="/" class="back-link"><i class="bi bi-arrow-left"></i> Voltar ao Catálogo</a>
        
        <div class="row mt-4 g-5">
            <div class="col-md-7">
                <div id="carouselDet" class="carousel slide shadow-sm rounded-4 overflow-hidden" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        {% for img in images %}
                        <div class="carousel-item {% if loop.first %}active{% endif %}">
                            <img src="{{ img.strip() }}" class="d-block w-100">
                        </div>
                        {% endfor %}
                    </div>
                    {% if images|length > 1 %}
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselDet" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon bg-dark rounded-circle" aria-hidden="true"></span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselDet" data-bs-slide="next">
                        <span class="carousel-control-next-icon bg-dark rounded-circle" aria-hidden="true"></span>
                    </button>
                    {% endif %}
                </div>
            </div>

            <div class="col-md-5">
                <h1 class="fw-bold display-5">{{ p.name }}</h1>
                <div class="price-big mb-4">
                    {% if p.price > 0 %} R$ {{ "%.2f"|format(p.price) }} {% else %} Consultar valor {% endif %}
                </div>
                
                <h5 class="fw-bold">Descrição:</h5>
                <p class="text-muted fs-5 mb-5">{{ p.description }}</p>

                <a href="https://wa.me/5511999999999?text=Olá! Quero encomendar o produto: {{ p.name }}" class="btn-wa shadow">
                    <i class="bi bi-whatsapp"></i> Pedir agora pelo WhatsApp
                </a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
